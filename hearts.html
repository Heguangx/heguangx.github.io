<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f}
body{display:flex;align-items:center;justify-content:center;position:relative}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
#textWrap{
  position:fixed;z-index:10;text-align:center;
  user-select:none;cursor:pointer;
  transform:translateY(-6%);
}
.t-char{
  display:inline-block;font-size:min(12vw,56px);font-weight:900;
  color:#ff2d55;
  text-shadow:0 0 60px rgba(255,45,85,.6),0 0 120px rgba(255,45,85,.3);
  animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:.8}
  50%{transform:scale(1.15);opacity:1}
}
</style>
</head>
<body>
<div id="textWrap">
  <div id="mainText">
    <span class="t-char" style="animation-delay:0s">杨</span>
    <span class="t-char" style="animation-delay:.35s">紫</span>
    <span class="t-char" style="animation-delay:.7s">瑜</span>
    <span class="t-char" style="animation-delay:1.05s">我</span>
    <span class="t-char" style="animation-delay:1.4s">爱</span>
    <span class="t-char" style="animation-delay:1.75s">爱</span>
  </div>
</div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
let W,H,hearts=[];
const dpr=Math.min(window.devicePixelRatio||1,3);

function resize(){
  W=innerWidth;H=innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';
  ctx.scale(dpr,dpr);
}
resize();window.addEventListener('resize',resize);

function drawAppleHeart(ctx,s,color){
  // heart path
  ctx.beginPath();
  ctx.moveTo(0,s*.4);
  ctx.bezierCurveTo(-s*.3,-s*.1,-s*.7,-s*.25,-s*.5,-s*.65);
  ctx.bezierCurveTo(-s*.35,-s*.85,0,-s*.75,0,-s*.55);
  ctx.bezierCurveTo(0,-s*.75,s*.35,-s*.85,s*.5,-s*.65);
  ctx.bezierCurveTo(s*.7,-s*.25,s*.3,-s*.1,0,s*.4);
  ctx.closePath();

  // gradient fill (Apple-style glossy)
  const g=ctx.createRadialGradient(-s*.3,-s*.5,s*.1,s*.1,-s*.2,s*1.2);
  g.addColorStop(0,'#ff6b8a');
  g.addColorStop(.3,'#ff2d55');
  g.addColorStop(.7,'#d91a3c');
  g.addColorStop(1,'#b31230');
  ctx.fillStyle=g;
  ctx.fill();

  // highlight (top-left shine)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(-s*.15,-s*.38);
  ctx.bezierCurveTo(-s*.25,-s*.5,-s*.15,-s*.6,0,-s*.55);
  ctx.bezierCurveTo(-s*.08,-s*.48,-s*.1,-s*.42,-s*.15,-s*.38);
  ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.25)';
  ctx.fill();
  ctx.restore();

  // subtle inner shadow (bottom)
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(0,s*.35);
  ctx.bezierCurveTo(-s*.1,s*.2,-s*.05,s*.1,0,s*.05);
  ctx.bezierCurveTo(s*.05,s*.1,s*.1,s*.2,0,s*.35);
  ctx.closePath();
  ctx.fillStyle='rgba(0,0,0,.15)';
  ctx.fill();
  ctx.restore();
}

class Heart{
  constructor(x,y){
    this.x=x;this.y=y;
    this.size=16+Math.random()*28;
    this.alpha=.3+Math.random()*.4;
    this.phase=Math.random()*Math.PI*2;
    this.speed=.0025+Math.random()*.0045;
    this.dx=(Math.random()-.5)*.12;
    this.dy=-(.02+Math.random()*.06);
    this.scale=.7+Math.random()*.3;
  }
  draw(){
    const breath=.8+Math.sin(this.phase)*.2;
    const s=this.size*breath*this.scale;
    const a=this.alpha*breath;
    ctx.save();ctx.translate(this.x,this.y);
    ctx.globalAlpha=a;
    ctx.shadowColor='#ff2d55';
    ctx.shadowBlur=20*a;
    drawAppleHeart(ctx,s);
    ctx.restore();
  }
  update(){
    this.phase+=this.speed;
    this.x+=this.dx;this.y+=this.dy;
    if(this.x<-100||this.x>W+100||this.y<-100){
      this.x=Math.random()*W;this.y=H+50;
      this.dx=(Math.random()-.5)*.12;
      this.dy=-(.02+Math.random()*.08);
    }
  }
}

for(let i=0;i<100;i++){
  const h=new Heart(Math.random()*W,Math.random()*H);
  h.phase=Math.random()*Math.PI*2;
  hearts.push(h);
}

setInterval(()=>{
  if(hearts.length<120){
    const h=new Heart(Math.random()*W,H+30);
    h.dy=-(.02+Math.random()*.08);
    hearts.push(h);
  }
},1500);

function loop(){
  ctx.clearRect(0,0,W,H);
  hearts.forEach(h=>{h.update();h.draw()});
  requestAnimationFrame(loop);
}
loop();

document.getElementById('textWrap').onclick=function(e){
  e.stopPropagation();
  const t=prompt('输入文字：',document.getElementById('mainText').innerText.replace(/<[^>]*>/g,''));
  if(t&&t.length>0){
    let html='';
    for(let i=0;i<t.length;i++){
      html+='<span class="t-char" style="animation-delay:'+(i*.35)+'s">'+(t[i]===' '?'&nbsp;':t[i])+'</span>';
    }
    document.getElementById('mainText').innerHTML=html;
  }
};
</script>
</body>
</html>
