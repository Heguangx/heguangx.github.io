<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f}
body{display:flex;align-items:center;justify-content:center;position:relative;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%}
#textWrap{
  position:fixed;z-index:10;text-align:center;
  user-select:none;cursor:pointer;
  transform:translateY(-6%);
}
.t-char{
  display:inline-block;font-size:min(12vw,56px);font-weight:900;
  color:#ff2d55;
  text-shadow:0 0 60px rgba(255,45,85,.6),0 0 120px rgba(255,45,85,.3);
  animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(1);opacity:.8}
  50%{transform:scale(1.15);opacity:1}
}
#celebration{
  position:fixed;z-index:30;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  width:100%;height:100%;background:#0a0a0f;
}
#celebration.show{display:flex}
#bigText{
  font-size:min(15vw,72px);font-weight:900;
  color:#ff2d55;text-align:center;
  text-shadow:0 0 80px rgba(255,45,85,.8),0 0 160px rgba(255,45,85,.4);
  animation:celebB 2s ease-in-out infinite;line-height:1.4;
}
@keyframes celebB{
  0%,100%{transform:scale(1);opacity:.9}
  50%{transform:scale(1.08);opacity:1}
}
</style>
</head>
<body>
<div id="textWrap">
  <div id="mainText">
    <span class="t-char" style="animation-delay:0s">杨</span>
    <span class="t-char" style="animation-delay:.35s">紫</span>
    <span class="t-char" style="animation-delay:.7s">瑜</span>
    <span class="t-char" style="animation-delay:1.05s">我</span>
    <span class="t-char" style="animation-delay:1.4s">爱</span>
    <span class="t-char" style="animation-delay:1.75s">你</span>
  </div>
</div>
<div id="celebration"><div id="bigText">我超级爱你</div></div>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const celeb=document.getElementById('celebration');
let W,H,hearts=[],celebMode=false;
const dpr=Math.min(window.devicePixelRatio||1,3);

function resize(){
  W=innerWidth;H=innerHeight;
  C.width=W*dpr;C.height=H*dpr;
  C.style.width=W+'px';C.style.height=H+'px';
  ctx.scale(dpr,dpr);
}
resize();window.addEventListener('resize',resize);

function drawHeart(ctx,s){
  ctx.beginPath();
  ctx.moveTo(0,s*.4);
  ctx.bezierCurveTo(-s*.3,-s*.1,-s*.7,-s*.25,-s*.5,-s*.65);
  ctx.bezierCurveTo(-s*.35,-s*.85,0,-s*.75,0,-s*.55);
  ctx.bezierCurveTo(0,-s*.75,s*.35,-s*.85,s*.5,-s*.65);
  ctx.bezierCurveTo(s*.7,-s*.25,s*.3,-s*.1,0,s*.4);
  ctx.closePath();
  const g=ctx.createRadialGradient(-s*.3,-s*.5,s*.1,s*.1,-s*.2,s*1);
  g.addColorStop(0,'#ff6b8a');g.addColorStop(.3,'#ff2d55');
  g.addColorStop(.7,'#d91a3c');g.addColorStop(1,'#b31230');
  ctx.fillStyle=g;ctx.fill();
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(-s*.12,-s*.3);
  ctx.bezierCurveTo(-s*.22,-s*.45,-s*.12,-s*.55,0,-s*.5);
  ctx.bezierCurveTo(-s*.06,-s*.42,-s*.08,-s*.36,-s*.12,-s*.3);
  ctx.closePath();ctx.fillStyle='rgba(255,255,255,.2)';ctx.fill();
  ctx.restore();
}

class Heart{
  constructor(x,y){
    this.x=x;this.y=y;this.size=12+Math.random()*18;
    this.alpha=.2+Math.random()*.3;this.phase=Math.random()*Math.PI*2;
    this.speed=.002+.004;this.dx=(Math.random()-.5)*.12;
    this.dy=-(.02+Math.random()*.06);this.scale=.7+Math.random()*.3;
  }
  draw(){
    const br=.8+Math.sin(this.phase)*.2;
    const s=this.size*br*this.scale;const a=this.alpha*br;
    ctx.save();ctx.translate(this.x,this.y);ctx.globalAlpha=a;
    ctx.shadowColor='#ff2d55';ctx.shadowBlur=12*a;
    drawHeart(ctx,s);ctx.restore();
  }
  update(){
    this.phase+=this.speed;this.x+=this.dx;this.y+=this.dy;
    if(this.x<-80||this.x>W+80||this.y<-80){
      this.x=Math.random()*W;this.y=H+30;
      this.dx=(Math.random()-.5)*.12;this.dy=-(.02+Math.random()*.08);
    }
  }
}

);
    }
  }
  draw(){
    this.parts.forEach(p=>{
      if(p.alpha<=0)return;
      ctx.save();ctx.translate(this.x+p.x,this.y+p.y);
      ctx.globalAlpha=p.alpha;ctx.shadowColor='#ff2d55';ctx.shadowBlur=10*p.alpha;
      drawHeart(ctx,p.size*p.alpha);ctx.restore();
    });
  }
  update(){
    this.parts.forEach(p=>{
      if(p.alpha<=0)return;p.x+=p.vx;p.vy+=.08;p.y+=p.vy;p.alpha-=p.decay;
    });
  }
  get alive(){return this.parts.some(p=>p.alpha>0)}
}

for(let i=0;i<80;i++){
  const h=new Heart(Math.random()*W,Math.random()*H);
  h.phase=Math.random()*Math.PI*2;hearts.push(h);
}
setInterval(()=>{
  if(!celebMode&&hearts.length<100){
    const h=new Heart(Math.random()*W,H+30);h.dy=-(.02+Math.random()*.08);hearts.push(h);
  }
},2000);



function triggerCelebration(){
  celebMode=true;hearts=[];
  C.style.display='none';document.getElementById('textWrap').style.display='none';
  celeb.classList.add('show');
  let count=0;const fw=setInterval(()=>{firework();count++;if(count>=4)clearInterval(fw);},2000);
  firework();
}

document.getElementById('textWrap').onclick=function(e){
  e.stopPropagation();
  const t=prompt('输入文字：',document.getElementById('mainText').innerText.replace(/<[^>]*>/g,''));
  if(t&&t.length>0){
    if(t==='我也爱你'){triggerCelebration();return;}
    let html='';
    for(let i=0;i<t.length;i++){
      html+='<span class="t-char" style="animation-delay:'+(i*.35)+'s">'+(t[i]===' '?'&nbsp;':t[i])+'</span>';
    }
    document.getElementById('mainText').innerHTML=html;
  }
};

function loop(){
  ctx.clearRect(0,0,W,H);
  hearts.forEach(h=>{h.update();h.draw()});
  bursts.forEach(b=>{b.update();b.draw()});
  bursts=bursts.filter(b=>b.alive);
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
