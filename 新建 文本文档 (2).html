<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 微信手机适配 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爱心表白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* 跳动爱心 */
        .heart-box {
            width: 140px;
            height: 130px;
            animation: beat 1s infinite ease-in-out;
            margin-bottom: 40px;
        }
        .heart {
            width: 100%;
            height: 100%;
            position: relative;
            filter: drop-shadow(0 0 15px #ff2255);
        }
        .heart:before, .heart:after {
            content: "";
            position: absolute;
            width: 70px;
            height: 110px;
            background: #ff2255;
            border-radius: 70px 70px 0 0;
        }
        .heart:before {
            left: 70px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart:after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }
        @keyframes beat {
            0%,100% {transform: scale(1);}
            50% {transform: scale(1.1);}
        }
        /* 表白文字样式 */
        .text {
            color: #fff;
            font-size: 24px;
            letter-spacing: 6px;
            text-align: center;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="heart-box">
        <div class="heart"></div>
    </div>
    <!-- 这里修改你想要的表白文字 -->
    <div class="text">杨 紫 瑜 我 爱 你
我超级爱你</div>
</body>
</html>
